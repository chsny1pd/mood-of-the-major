name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/motm_integration_test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  lighthouse-ci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: frontend-ci
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lighthouse

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Seed database
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/e2e
          JWT_SECRET: e2e-test-jwt-secret
          JWT_REFRESH_SECRET: e2e-test-refresh-secret
          CORS_ALLOWED_ORIGINS: http://localhost:4173
        run: npm run seed

      - name: Seed E2E admin user
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/e2e
          JWT_SECRET: e2e-test-jwt-secret
          JWT_REFRESH_SECRET: e2e-test-refresh-secret
        run: npm run seed:e2e-admin

      - name: Start backend
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          MONGODB_URI: mongodb://127.0.0.1:27017/e2e
          JWT_SECRET: e2e-test-jwt-secret
          JWT_REFRESH_SECRET: e2e-test-refresh-secret
          CORS_ALLOWED_ORIGINS: http://localhost:4173
        run: npx tsx src/index.ts &

      - name: Wait for backend
        run: npx --yes wait-on http://127.0.0.1:3000/health --timeout 60000

      - name: Build and preview frontend
        working-directory: frontend
        env:
          VITE_APP_ENV: test
        run: |
          npm ci
          npm run build
          npm run preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for frontend
        run: npx --yes wait-on http://127.0.0.1:4173 --timeout 60000

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          CI: true
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
