<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anonymous emotional sharing for university communities." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <title>Mood of the Major</title>
    <script>
      (function () {
        var storageKey = "motm-theme";
        var stored = localStorage.getItem(storageKey);
        var theme =
          stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
        var resolved =
          theme === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;
        var root = document.documentElement;
        if (resolved === "dark") {
          root.classList.add("dark");
        }
        root.style.colorScheme = resolved;

        var languageKey = "motm-language";
        var language = localStorage.getItem(languageKey);
        if (language === "en" || language === "th") {
          root.lang = language;
        }

        if (location.pathname === "/") {
          var homeRoot = document.getElementById("root");
          if (homeRoot) {
            homeRoot.innerHTML =
              '<div class="flex min-h-screen flex-col bg-stone-50 text-stone-900 dark:bg-stone-950 dark:text-stone-100">' +
              '<header class="border-b border-stone-200 bg-white/80 backdrop-blur dark:border-stone-700 dark:bg-stone-950/80">' +
              '<div class="mx-auto flex max-w-6xl items-center gap-4 px-4 py-3 sm:px-6">' +
              '<div class="flex min-w-0 flex-1 items-center gap-4">' +
              '<a href="/" class="shrink-0 text-lg font-semibold tracking-tight text-orange-800 dark:text-orange-300">Mood of the Major</a>' +
              '<nav class="hidden items-center gap-1 lg:flex" aria-label="Main navigation">' +
              '<a href="/" class="rounded-md px-2.5 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-orange-800 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-300">Home</a>' +
              '<a href="/feed" class="rounded-md px-2.5 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-orange-800 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-300">Feed</a>' +
              '<a href="/statistics" class="rounded-md px-2.5 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-orange-800 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-300">Statistics</a>' +
              '<a href="/how-to-use" class="rounded-md px-2.5 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-orange-800 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-300">How to Use</a>' +
              "</nav></div>" +
              '<div class="flex items-center gap-1 sm:gap-2">' +
              '<a href="/login" class="hidden rounded-xl px-2.5 py-1 text-xs font-medium text-stone-600 transition hover:bg-stone-100 hover:text-orange-800 sm:inline-flex dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-300">Log in</a>' +
              '<a href="/register" class="hidden rounded-xl bg-orange-700 px-2.5 py-1 text-xs font-medium text-white transition hover:bg-orange-800 sm:inline-flex dark:bg-orange-600 dark:hover:bg-orange-500">Join</a>' +
              "</div></div></header>" +
              '<main class="flex-1"><section class="mx-auto max-w-5xl px-4 py-16 sm:px-6 sm:py-24">' +
              '<div class="max-w-2xl">' +
              '<p class="mb-3 text-sm font-medium uppercase tracking-wide text-orange-700 dark:text-orange-300">University emotional wellness</p>' +
              '<h1 class="text-4xl font-semibold tracking-tight text-stone-900 dark:text-stone-100 sm:text-5xl">Share how you feel — anonymously, safely, together.</h1>' +
              '<p class="mt-6 text-lg leading-relaxed text-stone-600 dark:text-stone-300">Mood of the Major helps students express emotional experience without revealing identity, while communities understand collective mood across faculties and majors.</p>' +
              "</div>" +
              '<div class="mt-12 grid gap-4 sm:grid-cols-3">' +
              '<article class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm dark:border-stone-700 dark:bg-stone-900"><h2 class="text-base font-semibold text-stone-900 dark:text-stone-100">Anonymous posts</h2><p class="mt-2 text-sm leading-relaxed text-stone-600 dark:text-stone-300">Your voice matters. Your identity stays private in public views.</p></article>' +
              '<article class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm dark:border-stone-700 dark:bg-stone-900"><h2 class="text-base font-semibold text-stone-900 dark:text-stone-100">Faculty &amp; major feeds</h2><p class="mt-2 text-sm leading-relaxed text-stone-600 dark:text-stone-300">See how your academic community is feeling over time.</p></article>' +
              '<article class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm dark:border-stone-700 dark:bg-stone-900"><h2 class="text-base font-semibold text-stone-900 dark:text-stone-100">Built for trust</h2><p class="mt-2 text-sm leading-relaxed text-stone-600 dark:text-stone-300">Security, moderation, and privacy are core — not add-ons.</p></article>' +
              "</div>" +
              '<div class="mt-12 rounded-2xl border border-dashed border-orange-200 bg-orange-50/60 p-6 dark:border-orange-900 dark:bg-orange-950/40"><p class="text-sm text-orange-900 dark:text-orange-100"><span class="font-semibold">Authentication is live.</span> Create an account to access your feed — browse anonymous moods or share your own.</p></div>' +
              "</section></main>" +
              '<footer class="border-t border-stone-200 bg-white dark:border-stone-700 dark:bg-stone-900"><div class="mx-auto max-w-5xl px-4 py-6 text-sm text-stone-500 sm:px-6 dark:text-stone-400">Anonymous emotional sharing for university communities.</div></footer>' +
              "</div>";
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
